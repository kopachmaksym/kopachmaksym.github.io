            <label class="desc">Мікрочіп animal-id mini (1,4 х 8мм) на даний момент є одним з найпопулярніших продуктів на ринку України у сфері ідентифікації тварин. Чудово підходить для чіпування всіх видів тварин.Розроблений у відповідності з міжнародними стандартами ISO 11784/85. Унікальний 15-значний код, який неможливо переписати, підробити або перепрограмувати. Легко зчитується сканерамистандарту ISO 11784/85 FDX-B всіх виробників. Транспондер складається з канули та ін’єктора. Завдяки системі LuerLock, канула чітко фіксується з ін’єктором, що робить процедуру імплантації максимально зручною. Ін’єктор, вироблений з харчового екопластика, розроблений у співпраці з німецькими ветлікарями, дуже зручний в роботі як жінкам так і чоловікам.</label>
